<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long Asia | Client Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Premium Butter Smooth Scrolling Engine (Lenis) -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

    <!-- Google Translate Script -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,hi,mr,ta,te',
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    
    <style>
        /* Smooth scrolling styles for Lenis */
        html.lenis { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }
        .lenis.lenis-scrolling iframe { pointer-events: none; }
        
        /* Hide Google Translate UI elements completely to maintain premium look */
        body { top: 0 !important; position: static !important; }
        .skiptranslate iframe, .goog-te-banner-frame { display: none !important; }
        #goog-gt-tt, .goog-te-spinner-pos { display: none !important; }
        .goog-text-highlight { background-color: transparent !important; box-shadow: none !important; }
        #google_translate_element { display: none !important; }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes fadeInContent {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes marquee {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
        .animate-fade-up { animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-in-content { animation: fadeInContent 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-marquee { animation: marquee 35s linear infinite; display: inline-flex; white-space: nowrap; }
        
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }
        .delay-600 { animation-delay: 600ms; }
        body { background-color: black; margin: 0; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>
    <div id="google_translate_element"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Base Icon Component
        const Icon = ({ path, viewBox="0 0 24 24", className="w-6 h-6" }) => (

        );

        // SVG Paths & Complex Icons
        const ChatIcon = ({className="w-6 h-6"}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 9a2 2 0 0 1-2 2H6l-4 4V4c0-1.1.9-2 2-2h8a2 2 0 0 1 2 2z"></path><path d="M18 9h2a2 2 0 0 1 2 2v11l-4-4h-6a2 2 0 0 1-2-2v-1"></path></svg>
        );
        const GlobeIcon = ({className="w-6 h-6"}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
        );
        const BellIcon = ({className="w-6 h-6"}) => (

        const paths = {

            close: "M6 18L18 6M6 6l12 12",
            wallet: "M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z",
            calendar: "M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z",

        // Mock User Data
        const userData = {
            name: "Alexander Pierce",
            id: "LA-984321",
            rank: "GOLD",
            balance: 1450.50,
            activeInvestment: 1000.00,
            totalIbCommission: 3420.75,
            todayIbCommission: 124.50,

        // Mock Company Notifications
        const initialNotifications = [

            { id: "TX9812", type: "Daily ROI", amount: "+$14.50", date: "Yesterday", status: "Completed", color: "text-blue-400" },

        // --- COMPONENTS ---

        const StatCard = ({ title, value, subtitle, icon, highlight }) => (

                <div className="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
                <div className="flex justify-between items-start mb-4">

        const GrowthTracker = () => {
            const [progress, setProgress] = useState(0);
            const targetAmount = 2000;
            const expectedDate = "November 2026";
            const percentage = Math.min((userData.balance / targetAmount) * 100, 100);

            useEffect(() => {
                const timer = setTimeout(() => setProgress(percentage), 600);

            return (
                <div className="w-full mt-8 p-6 sm:p-10 bg-[#050505] border border-white/10 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.8)] relative overflow-hidden group">
                    <div className="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-blue-500/50 to-transparent opacity-50"></div>
                    
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">

                            </div>
                            <h3 className="text-3xl sm:text-4xl lg:text-5xl font-light text-white tracking-widest uppercase">
                                Guaranteed <span className="font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-neutral-400">2X Growth</span>
                            </h3>
                        </div>
                        
                        <div className="text-left md:text-right w-full md:w-auto p-4 bg-white/5 rounded-xl border border-white/5 shadow-inner">
                            <p className="text-[10px] uppercase tracking-[0.2em] text-neutral-500 mb-1">Estimated Current Value</p>
                            <div className="flex items-baseline md:justify-end gap-1">
                                <h3 className="text-3xl sm:text-4xl font-bold text-white tracking-wider">${userData.balance.toLocaleString('en-US', {minimumFractionDigits: 2})}</h3>
                                <span className="text-sm font-medium text-neutral-500 mb-1">/ $2,000</span>
                            </div>
                            <div className="mt-3 inline-flex items-center gap-1.5 px-2.5 py-1 bg-emerald-500/10 border border-emerald-500/20 rounded text-emerald-400 text-[9px] uppercase tracking-[0.15em] font-medium">
                                <Icon path={paths.calendar} className="w-3 h-3" />

                            </div>
                        </div>
                    </div>

                    <div className="relative pt-2 pb-8">
                        <div className="absolute top-3 left-0 h-2 w-full bg-blue-500/20 blur-md rounded-full"></div>
                        <div className="relative h-2 w-full bg-neutral-900 rounded-full overflow-hidden border border-white/5 shadow-[inset_0_2px_4px_rgba(0,0,0,0.6)]">
                            <div 
                                className="absolute top-0 left-0 h-full bg-gradient-to-r from-blue-900 via-blue-500 to-cyan-300 transition-all duration-[2000ms] ease-out flex items-center justify-end"

                        </div>

                                <span className="text-white font-medium">$1,000</span>
                                <span className="text-[8px] text-neutral-500 uppercase mt-0.5">Start</span>
                            </div>

                                <div className="w-0.5 h-2 bg-neutral-700 mb-2 -mt-6"></div>
                                <span className="text-neutral-300">$1,500</span>
                                <span className="text-[8px] text-neutral-500 uppercase mt-0.5">1.5X Mark</span>
                            </div>
                            <div className="flex flex-col items-end w-1/3">
                                <div className="w-0.5 h-2 bg-neutral-700 mb-2 -mt-6"></div>
                                <span className="text-cyan-400 font-bold">$2,000</span>
                                <span className="text-[8px] text-cyan-500/70 uppercase mt-0.5 flex items-center gap-1">Auto-Withdrawal</span>

                <div className="p-6 border-b border-white/10 flex justify-between items-center bg-white/5">
                    <h3 className="text-sm tracking-[0.2em] uppercase font-bold text-white">Recent Activity</h3>
                    <button className="text-[10px] uppercase tracking-widest text-neutral-400 hover:text-white transition-colors">View All</button>
                </div>
                <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse">

                            <tr className="border-b border-white/5 text-[10px] uppercase tracking-widest text-neutral-500 bg-black/40">

                                <th className="p-4 font-medium">Type</th>
                                <th className="p-4 font-medium">Date</th>

                                    <td className="p-4 font-sans tracking-wide uppercase text-[10px]">{tx.type}</td>

        // --- VIEWS ---

                        <div className="p-8 border-b border-white/10 bg-white/5">
                            <h2 className="text-xl sm:text-2xl font-light tracking-widest uppercase text-white mb-2">Deposit Funds</h2>

                                <div className="p-4 border border-blue-500/50 bg-blue-500/10 rounded-xl flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold text-xs">USDT</div>
                                        <span className="font-bold tracking-widest">USDT (TRC20)</span>
                                    </div>
                                    <span className="text-[10px] uppercase tracking-widest text-blue-400">Selected</span>
                                </div>
                            </div>

                            <div className="flex flex-col items-center py-6 border border-white/5 rounded-xl bg-black/50">
                                <div className="w-40 h-40 bg-white p-2 rounded-lg mb-6">
                                    {/* Mock QR Code using simple CSS grid for visual effect */}
                                    <div className="w-full h-full bg-black flex flex-wrap gap-1 p-1">
                                        {[...Array(64)].map((_, i) => <div key={i} className={`w-[12%] h-[12%] ${Math.random() > 0.5 ? 'bg-white' : 'bg-black'}`}></div>)}
                                    </div>
                                </div>
                                <label className="block text-[10px] uppercase tracking-widest text-neutral-500 mb-2">Deposit Address</label>

        };

        const WithdrawView = () => {
            const [amount, setAmount] = useState('');
            const fee = amount ? (parseFloat(amount) * 0.02).toFixed(2) : '0.00';
            const receive = amount ? (parseFloat(amount) - parseFloat(fee)).toFixed(2) : '0.00';

            return (
                <div className="max-w-2xl mx-auto animate-fade-in-content">
                    <div className="bg-[#050505] border border-white/10 rounded-3xl overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.5)]">
                        <div className="p-8 border-b border-white/10 bg-white/5 flex justify-between items-end">
                            <div>
                                <h2 className="text-xl sm:text-2xl font-light tracking-widest uppercase text-white mb-2">Withdraw Funds</h2>
                                <p className="text-xs text-neutral-400 uppercase tracking-widest">Transfer to external wallet</p>
                            </div>
                            <div className="text-right">
                                <p className="text-[10px] uppercase tracking-[0.2em] text-neutral-500 mb-1">Available</p>
                                <p className="text-xl font-bold text-white tracking-wider">${userData.balance.toLocaleString('en-US', {minimumFractionDigits: 2})}</p>
                            </div>
                        </div>
                        
                        <div className="p-8 space-y-6">
                            <div>
                                <label className="block text-[10px] uppercase tracking-widest text-neutral-500 mb-3">Destination Address (USDT TRC20)</label>
                                <input type="text" placeholder="Paste TRC20 Address here" className="w-full bg-black/50 border border-white/10 p-4 rounded-xl text-sm text-white focus:outline-none focus:border-blue-500/50 transition-colors font-mono" />
                            </div>
                            
                            <div>
                                <label className="block text-[10px] uppercase tracking-widest text-neutral-500 mb-3 flex justify-between">
                                    <span>Withdrawal Amount</span>
                                    <button onClick={() => setAmount(userData.balance.toString())} className="text-blue-400 hover:text-blue-300">MAX</button>
                                </label>
                                <div className="relative">
                                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-neutral-500 font-bold">$</span>
                                    <input 
                                        type="number" 
                                        value={amount}
                                        onChange={(e) => setAmount(e.target.value)}

                                        className="w-full bg-black/50 border border-white/10 p-4 pl-8 rounded-xl text-lg text-white font-bold tracking-wider focus:outline-none focus:border-blue-500/50 transition-colors" 
                                    />
                                </div>
                            </div>

                            <div className="bg-white/5 border border-white/5 p-4 rounded-xl space-y-3 text-xs tracking-widest uppercase text-neutral-400">
                                <div className="flex justify-between">
                                    <span>Network Fee (2%)</span>
                                    <span className="text-white">${fee}</span>
                                </div>
                                <div className="flex justify-between border-t border-white/10 pt-3 text-sm">
                                    <span className="font-bold text-white">You Will Receive</span>
                                    <span className="font-bold text-green-400">${receive}</span>
                                </div>
                            </div>

                            <button className="w-full py-4 bg-white text-black text-xs font-bold uppercase tracking-[0.2em] hover:bg-neutral-200 transition-all rounded-xl shadow-[0_0_20px_rgba(255,255,255,0.2)]">

        const NetworkView = () => {
            const [copied, setCopied] = useState(false);
            const refLink = `https://longasiagroups.com/join/${userData.id}`;
            
            const handleCopy = () => {

            const apiKey = "";

            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

            const systemPrompt = `You are the official Support Bot for Long Asia Wealth Management. Keep all answers short (2-3 sentences max).`;

                e.preventDefault();
                const userQuery = input.trim();
                if (!userQuery) return;
                
                setMessages(prev => [...prev, { sender: 'user', text: userQuery }]);
                setInput('');
                setIsLoading(true);

                const payload = {
                    contents: [{ parts: [{ text: userQuery }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                const delays = [1000, 2000, 4000, 8000, 16000];
                let attempt = 0;
                let botResponse = "High network traffic. Please email support@longasiagroups.com.";

                while (attempt < delays.length + 1) {
                    try {
                        const response = await fetch(endpoint, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) throw new Error('API Error');

                        const data = await response.json();
                        botResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "I couldn't process that.";
                        break; 
                    } catch (err) {
                        if (attempt < delays.length) {
                            await new Promise(resolve => setTimeout(resolve, delays[attempt]));
                            attempt++;
                        } else {
                            break; 
                        }
                    }

                setIsLoading(false);

                        <MobileNavButton view="dashboard" label="Dashboard" />
                        <MobileNavButton view="deposit" label="Deposit" />
                        <MobileNavButton view="withdraw" label="Withdraw" />
                        <MobileNavButton view="network" label="Network (IB)" />

                    {/* Dynamic View Content */}
                    <main className="pt-40 md:pt-48 pb-32 px-4 sm:px-8 max-w-7xl mx-auto relative z-10 min-h-screen">
                        
                        {/* Page Header Area (adapts to view) */}
                        <div className="mb-10 sm:mb-16 animate-fade-up">
                            {currentView === 'dashboard' && (
                                <div>
                                    <h1 className="notranslate text-4xl md:text-5xl font-light uppercase tracking-widest text-white mb-2">
                                        Portfolio <span className="font-bold [text-shadow:0_0_20px_rgba(255,255,255,0.3)]">Overview</span>
                                    </h1>
                                    <p className="text-neutral-500 text-xs sm:text-sm tracking-widest uppercase">Live metrics and quantitative engine status</p>

                            {currentView === 'deposit' && (
                                <div className="text-center">
                                    <h1 className="notranslate text-4xl md:text-5xl font-light uppercase tracking-widest text-white mb-2">
                                        Fund <span className="font-bold [text-shadow:0_0_20px_rgba(255,255,255,0.3)]">Account</span>
                                    </h1>
                                </div>
                            )}
                            {currentView === 'withdraw' && (
                                <div className="text-center">
                                    <h1 className="notranslate text-4xl md:text-5xl font-light uppercase tracking-widest text-white mb-2">
                                        Capital <span className="font-bold [text-shadow:0_0_20px_rgba(255,255,255,0.3)]">Extraction</span>
                                    </h1>
                                </div>
                            )}
                            {currentView === 'network' && (
                                <div className="text-center">
                                    <h1 className="notranslate text-4xl md:text-5xl font-light uppercase tracking-widest text-white mb-2">
                                        Global <span className="font-bold [text-shadow:0_0_20px_rgba(255,255,255,0.3)]">Network</span>
                                    </h1>
                                </div>
                            )}
                            {currentView === 'profile' && (
                                <div className="text-center">
                                    <h1 className="notranslate text-4xl md:text-5xl font-light uppercase tracking-widest text-white mb-2">
                                        Account <span className="font-bold [text-shadow:0_0_20px_rgba(255,255,255,0.3)]">Details</span>
                                    </h1>
                                </div>
                            )}
                        </div>

                        {/* Render Active Component */}
                        {currentView === 'dashboard' && <DashboardView />}
                        {currentView === 'deposit' && <DepositView />}
                        {currentView === 'withdraw' && <WithdrawView />}
                        {currentView === 'network' && <NetworkView />}
                        {currentView === 'profile' && <ProfileView />}

                    </main>

                    {/* Footer */}
                    <footer className="border-t border-white/5 py-12 px-4 sm:px-8 flex flex-col md:flex-row items-center justify-between bg-black relative z-10">
                        <img src="https://i.ibb.co/kVwvjjrR/long-asia-png.png" className="h-16 grayscale brightness-0 invert opacity-40 hover:opacity-100 transition-all duration-500 mb-6 md:mb-0 notranslate" alt="Logo" />
                        <div className="text-center md:text-left flex-1 md:pl-8">
                            <p className="text-[10px] tracking-[0.2em] text-neutral-600 uppercase mb-1">© 2026 Long Asia Quantitative Network.</p>
                            <p className="text-[9px] tracking-widest text-neutral-700 uppercase">Institutional Grade Infrastructure</p>
                        </div>
                        <div className="flex space-x-6 text-[10px] font-mono tracking-widest uppercase text-neutral-500 mt-6 md:mt-0">
                            <a href="#" className="hover:text-white transition-colors">Privacy</a>
                            <a href="#" className="hover:text-white transition-colors">Terms</a>
                            <a href="mailto:support@longasiagroups.com" className="hover:text-white transition-colors">Support</a>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
