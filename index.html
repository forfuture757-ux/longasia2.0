    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Premium Butter Smooth Scrolling Engine (Lenis) -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

    <!-- Google Translate Script -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,hi,mr,ta,te',
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    
    <style>
        /* Smooth scrolling styles for Lenis */
        html.lenis { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }
        .lenis.lenis-scrolling iframe { pointer-events: none; }
        
        /* Hide Google Translate UI elements completely to maintain premium look */
        body { top: 0 !important; position: static !important; }
        .skiptranslate iframe, .goog-te-banner-frame { display: none !important; }
        #goog-gt-tt, .goog-te-spinner-pos { display: none !important; }
        .goog-text-highlight { background-color: transparent !important; box-shadow: none !important; }
        #google_translate_element { display: none !important; }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes fadeInContent {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes marquee {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
        .animate-fade-up { animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-in-content { animation: fadeInContent 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-marquee { animation: marquee 35s linear infinite; display: inline-flex; white-space: nowrap; }
        
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }
        .delay-600 { animation-delay: 600ms; }
        body { background-color: black; margin: 0; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>

                e.preventDefault();
                const userQuery = input.trim();
                if (!userQuery) return;
                
                setMessages(prev => [...prev, { sender: 'user', text: userQuery }]);
                setInput('');
                setIsLoading(true);

                const payload = {
                    contents: [{ parts: [{ text: userQuery }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                const delays = [1000, 2000, 4000, 8000, 16000];
                let attempt = 0;
                let botResponse = "High network traffic. Please email support@longasiagroups.com.";

                while (attempt < delays.length + 1) {
                    try {
                        const response = await fetch(endpoint, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) throw new Error('API Error');

                        const data = await response.json();
                        botResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "I couldn't process that.";
                        break; 
                    } catch (err) {
                        if (attempt < delays.length) {
                            await new Promise(resolve => setTimeout(resolve, delays[attempt]));
                            attempt++;
                        } else {
                            break; 
                        }
                    }
                }

                setIsLoading(false);

                            <NavButton view="profile" label="Profile" />
                        </div>

                        <div className="flex items-center space-x-2 lg:space-x-4 z-50 shrink-0">
                            <div className="hidden sm:flex flex-col items-end mr-4">
                                <span className="text-[9px] uppercase tracking-[0.2em] text-neutral-500">Welcome back,</span>
                                <span className="text-xs font-bold uppercase tracking-widest text-white">{userData.name}</span>
                            </div>

                            {/* Notification Bell Dropdown */}
                            <div className="relative">
                                <button 
                                    onClick={() => {
                                        setNotifPanelOpen(!notifPanelOpen);
                                        setShowNotifPopup(false);
                                    }} 
                                    className="flex items-center gap-1.5 p-2 text-white hover:text-neutral-400 transition-colors rounded-full hover:bg-white/5 relative z-[110]"
                                >
                                    <BellIcon className="w-5 h-5 sm:w-6 sm:h-6" />
                                    {unreadCount > 0 && (
                                        <span className="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border border-black animate-pulse"></span>
                                    )}
                                </button>
                                
                                {notifPanelOpen && (
                                    <>
                                        <div className="fixed inset-0 z-[100]" onClick={() => setNotifPanelOpen(false)}></div>
                                        <div className="absolute top-full right-0 mt-2 w-[300px] sm:w-96 bg-black border border-white/20 rounded-xl shadow-[0_0_30px_rgba(0,0,0,0.8)] z-[110] flex flex-col overflow-hidden animate-pop-in backdrop-blur-3xl text-left">
                                            <div className="bg-white/5 px-4 py-4 border-b border-white/10 flex justify-between items-center">
                                                <span className="font-bold text-[10px] sm:text-xs tracking-widest uppercase text-white">Notifications Center</span>
                                                {unreadCount > 0 && (
                                                    <button onClick={markAllNotificationsRead} className="text-[9px] uppercase tracking-widest text-blue-400 hover:text-blue-300 font-bold">Mark all read</button>
                                                )}
                                            </div>
                                            <div className="max-h-[400px] overflow-y-auto" data-lenis-prevent>
                                                {notifications.map(n => (
                                                    <div key={n.id} className={`p-4 border-b border-white/5 last:border-0 transition-colors relative ${n.unread ? 'bg-blue-500/5' : 'hover:bg-white/5'}`}>
                                                        {n.unread && <span className="absolute left-2 top-5 w-1.5 h-1.5 bg-blue-500 rounded-full"></span>}
                                                        <div className={`flex flex-col gap-1 ${n.unread ? 'pl-3' : 'pl-0'}`}>
                                                            <div className="flex justify-between items-start">
                                                                <h4 className={`text-xs font-bold ${n.unread ? 'text-white' : 'text-neutral-400'}`}>{n.title}</h4>
                                                                <span className="text-[9px] text-neutral-500 whitespace-nowrap ml-2 mt-0.5">{n.date}</span>
                                                            </div>
                                                            <p className="text-[10px] text-neutral-500 leading-relaxed mt-1">{n.message}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>

                            <div className="relative">
                                <button onClick={() => setLangMenuOpen(!langMenuOpen)} className="flex items-center gap-1.5 p-2 text-white hover:text-neutral-400 transition-colors rounded-full hover:bg-white/5 relative z-[110]">
                                    <GlobeIcon className="w-5 h-5 sm:w-6 sm:h-6" />
                                    <span key={currentLang} className="notranslate text-[10px] font-bold tracking-widest uppercase hidden lg:block">{currentLang}</span>
                                </button>
                                {langMenuOpen && (
                                    <>
                                        <div className="fixed inset-0 z-[100]" onClick={() => setLangMenuOpen(false)}></div>
                                        <div className="absolute top-full right-0 mt-2 w-32 bg-black border border-white/20 rounded-xl shadow-[0_0_30px_rgba(0,0,0,0.8)] z-[110] flex flex-col text-left">
                                            {['EN', 'HI', 'MR', 'TA', 'TE'].map(lang => (
                                                <button key={lang} onClick={() => changeLang(lang)} className={`px-4 py-3 text-xs tracking-widest font-bold text-left transition-colors border-b border-white/5 last:border-0 ${currentLang === lang ? 'bg-white text-black' : 'text-neutral-300 hover:bg-white/10 hover:text-white'}`}>
                                                    <span className="notranslate">{{'EN':'English','HI':'Hindi','MR':'Marathi','TA':'Tamil','TE':'Telugu'}[lang]}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </>
                                )}
                            </div>

                            <button onClick={() => setChatOpen(true)} className="p-2 text-white hover:text-neutral-400 transition-colors rounded-full hover:bg-white/5">
                                <ChatIcon className="w-5 h-5 sm:w-6 sm:h-6" />
                            </button>

                            <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="lg:hidden p-2 text-white hover:text-neutral-300 transition-colors">
                                <Icon path={mobileMenuOpen ? paths.close : paths.menu} className="w-6 h-6 sm:w-7 sm:h-7" />
                            </button>
                        </div>
                    </nav>

                    <ChatWidget isOpen={chatOpen} onClose={() => setChatOpen(false)} />

                    {/* Market / Activity Ticker */}
                    <div className="fixed top-24 md:top-28 left-0 w-full bg-blue-500/5 border-b border-white/5 z-40 backdrop-blur-md overflow-hidden flex items-center py-2">
                        <div className="animate-marquee items-center gap-12 text-[10px] md:text-xs tracking-[0.3em] uppercase text-white font-mono pl-8">
                            <span className="flex items-center gap-3">
                                <span className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.8)]"></span>
                                {tickerData}
                            </span>
                            <span className="flex items-center gap-3">
                                <span className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.8)]"></span>
                                {tickerData}
                            </span>
                        </div>
                    </div>

                    {/* Mobile Menu Overlay */}
                    <div className={`fixed inset-0 bg-black/95 backdrop-blur-3xl z-40 flex flex-col items-center justify-center space-y-6 transition-all duration-500 lg:hidden ${mobileMenuOpen ? 'opacity-100 pointer-events-auto translate-y-0' : 'opacity-0 pointer-events-none -translate-y-8'}`}>
                        <MobileNavButton view="dashboard" label="Dashboard" />
                        <MobileNavButton view="deposit" label="Deposit" />
                        <MobileNavButton view="withdraw" label="Withdraw" />
                        <MobileNavButton view="network" label="Network (IB)" />
                        <MobileNavButton view="profile" label="Profile" />
                    </div>

                    {/* Dynamic View Content */}
                    <main className="pt-40 md:pt-48 pb-32 px-4 sm:px-8 max-w-7xl mx-auto relative z-10 min-h-screen">
                        
                        {/* Page Header Area (adapts to view) */}
                        <div className="mb-10 sm:mb-16 animate-fade-up">
                            {currentView === 'dashboard' && (
                                <div>
                                    <h1 className="notranslate text-4xl md:text-5xl font-light uppercase tracking-widest text-white mb-2">
                                        Portfolio <span className="font-bold [text-shadow:0_0_20px_rgba(255,255,255,0.3)]">Overview</span>
                                    </h1>
                                    <p className="text-neutral-500 text-xs sm:text-sm tracking-widest uppercase">Live metrics and quantitative engine status</p>
                                </div>
                            )}
                            {currentView === 'deposit' && (
                                <div className="text-center">
                                    <h1 className="notranslate text-4xl md:text-5xl font-light uppercase tracking-widest text-white mb-2">
                                        Fund <span className="font-bold [text-shadow:0_0_20px_rgba(255,255,255,0.3)]">Account</span>
                                    </h1>
                                </div>
                            )}
                            {currentView === 'withdraw' && (
                                <div className="text-center">
                                    <h1 className="notranslate text-4xl md:text-5xl font-light uppercase tracking-widest text-white mb-2">
                                        Capital <span className="font-bold [text-shadow:0_0_20px_rgba(255,255,255,0.3)]">Extraction</span>
                                    </h1>
                                </div>
                            )}
                            {currentView === 'network' && (
                                <div className="text-center">
                                    <h1 className="notranslate text-4xl md:text-5xl font-light uppercase tracking-widest text-white mb-2">
                                        Global <span className="font-bold [text-shadow:0_0_20px_rgba(255,255,255,0.3)]">Network</span>
                                    </h1>
                                </div>
                            )}
                            {currentView === 'profile' && (
                                <div className="text-center">
                                    <h1 className="notranslate text-4xl md:text-5xl font-light uppercase tracking-widest text-white mb-2">
                                        Account <span className="font-bold [text-shadow:0_0_20px_rgba(255,255,255,0.3)]">Details</span>
                                    </h1>
                                </div>
                            )}
                        </div>

                        {/* Render Active Component */}
                        {currentView === 'dashboard' && <DashboardView />}
                        {currentView === 'deposit' && <DepositView />}
                        {currentView === 'withdraw' && <WithdrawView />}
                        {currentView === 'network' && <NetworkView />}
                        {currentView === 'profile' && <ProfileView />}

                    </main>

                    {/* Footer */}
                    <footer className="border-t border-white/5 py-12 px-4 sm:px-8 flex flex-col md:flex-row items-center justify-between bg-black relative z-10">
                        <img src="https://i.ibb.co/kVwvjjrR/long-asia-png.png" className="h-16 grayscale brightness-0 invert opacity-40 hover:opacity-100 transition-all duration-500 mb-6 md:mb-0 notranslate" alt="Logo" />
                        <div className="text-center md:text-left flex-1 md:pl-8">
                            <p className="text-[10px] tracking-[0.2em] text-neutral-600 uppercase mb-1">© 2026 Long Asia Quantitative Network.</p>
                            <p className="text-[9px] tracking-widest text-neutral-700 uppercase">Institutional Grade Infrastructure</p>
                        </div>
                        <div className="flex space-x-6 text-[10px] font-mono tracking-widest uppercase text-neutral-500 mt-6 md:mt-0">
                            <a href="#" className="hover:text-white transition-colors">Privacy</a>
                            <a href="#" className="hover:text-white transition-colors">Terms</a>
                            <a href="mailto:support@longasiagroups.com" className="hover:text-white transition-colors">Support</a>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
